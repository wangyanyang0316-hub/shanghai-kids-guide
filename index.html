<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遛娃小脚印 - 每日亲子活动指南</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F9F5F0;
  --bg-cream: #FFF8F0;
  --bg-card: #FFFFFF;
  --bg-hover: #F5EDE3;
  --bg-sidebar: #F5EDE3;
  --border: #E8DDD0;
  --border-light: #F0E6D8;
  --text: #3D3024;
  --text-sec: #7A6B5D;
  --text-muted: #B8A898;
  --accent: #C47A5A;
  --accent-light: rgba(196,122,90,0.10);
  --accent-glow: rgba(196,122,90,0.18);
  --green: #6DB88F;
  --orange: #D4A04A;
  --red: #D4606A;
  --purple: #9B7AD8;
  --teal: #5BADC4;
  --pink: #D87098;
  --sage: #8BA888;
  --lavender: #C4A0D8;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 2px 8px rgba(61,48,36,0.06);
  --shadow-md: 0 4px 20px rgba(61,48,36,0.10);
  --transition: 0.25s ease;
  --font: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  scroll-behavior: smooth;
}

/* ===== LAYOUT ===== */
.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-light);
  z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo {
  font-size: 20px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px;
}
.logo-icon { font-size: 24px; }
.logo-text { color: var(--text); font-weight: 400; font-size: 16px; opacity: 0.7; }
.date-badge {
  background: var(--accent-light); border-radius: var(--radius-sm);
  padding: 4px 10px; font-size: 12px; color: var(--accent); font-weight: 500;
}

.header-right { display: flex; align-items: center; gap: 10px; }
.header-weather {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg-cream); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 4px 10px;
  font-size: 12px; color: var(--text-sec); cursor: default;
}
.header-weather .hw-icon { font-size: 16px; }
.header-weather .hw-temp { font-weight: 700; color: var(--text); }

.search-wrap { position: relative; }
.search-wrap input {
  background: var(--bg-cream); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 10px 7px 32px;
  color: var(--text); font-size: 13px; width: 220px; transition: var(--transition);
  font-family: var(--font);
}
.search-wrap input:focus { outline: none; border-color: var(--accent); width: 260px; background: #fff; }
.search-wrap .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }

.itinerary-toggle-btn {
  background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 500;
  transition: var(--transition); display: flex; align-items: center; gap: 4px;
  font-family: var(--font);
}
.itinerary-toggle-btn:hover { background: #B06848; }
.itinerary-toggle-btn .itin-count {
  background: #fff; color: var(--accent); border-radius: 10px;
  padding: 1px 6px; font-size: 11px; font-weight: 700;
}

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--bg-card);
  border-right: 1px solid var(--border-light);
  padding: 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 18px;
}

/* Weather mini card */
.weather-mini {
  background: linear-gradient(135deg, var(--bg-cream), rgba(212,160,74,0.08));
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px; display: flex; align-items: center; gap: 10px;
}
.weather-mini .wm-temp {
  font-size: 28px; font-weight: 700; line-height: 1;
  color: var(--orange);
}
.weather-mini .wm-info { font-size: 12px; }
.weather-mini .wm-cond { font-weight: 600; display: flex; align-items: center; gap: 4px; }
.weather-mini .wm-detail { color: var(--text-muted); font-size: 10px; }
.weather-mini .wm-tip {
  font-size: 11px; color: var(--accent); margin-top: 6px;
  padding: 4px 8px; background: var(--accent-light); border-radius: 6px;
  display: none;
}

.weather-btn-row { display: flex; gap: 6px; }
.weather-btn {
  flex: 1; padding: 6px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text-sec); cursor: pointer;
  font-size: 11px; text-align: center; transition: var(--transition);
  font-family: var(--font);
}
.weather-btn.active.sunny { border-color: var(--orange); background: rgba(212,160,74,0.12); color: var(--orange); }
.weather-btn.active.rainy { border-color: var(--teal); background: rgba(91,173,196,0.12); color: var(--teal); }

.type-btn-row { display: flex; gap: 4px; }
.type-btn {
  flex: 1; padding: 6px 2px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--text-sec); cursor: pointer;
  font-size: 11px; transition: var(--transition); font-family: var(--font);
}
.type-btn.active.all { border-color: var(--text-muted); background: var(--bg-hover); color: var(--text); }
.type-btn.active.indoor { border-color: var(--teal); background: rgba(91,173,196,0.10); color: var(--teal); }
.type-btn.active.outdoor { border-color: var(--green); background: rgba(109,184,143,0.10); color: var(--green); }

/* Filter group */
.filter-group h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); margin-bottom: 10px; font-weight: 600;
}

/* Age range slider */
.age-slider-wrap {
  background: var(--bg-cream); border-radius: var(--radius-sm);
  padding: 10px 12px; border: 1px solid var(--border-light);
}
.age-slider-labels {
  display: flex; justify-content: space-between; margin-bottom: 6px;
  font-size: 10px; color: var(--text-muted);
}
.age-slider-values {
  text-align: center; font-size: 13px; font-weight: 600; color: var(--accent);
  margin-top: 4px;
}
.age-slider-track {
  position: relative; height: 6px; background: var(--border);
  border-radius: 3px; margin: 8px 0;
}
.age-slider-fill {
  position: absolute; height: 100%; background: var(--accent);
  border-radius: 3px; transition: left 0.15s, width 0.15s;
}
.age-slider-thumb {
  position: absolute; top: -5px; width: 16px; height: 16px;
  background: #fff; border: 2px solid var(--accent); border-radius: 50%;
  cursor: grab; z-index: 2; transition: box-shadow 0.15s;
  touch-action: none;
}
.age-slider-thumb:hover, .age-slider-thumb.dragging { box-shadow: 0 0 0 4px var(--accent-light); }

/* Chip filters */
.filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  padding: 4px 10px; border-radius: 16px; border: 1px solid var(--border);
  font-size: 11px; cursor: pointer; transition: var(--transition);
  color: var(--text-sec); background: transparent; white-space: nowrap;
  user-select: none; font-family: var(--font);
}
.chip:hover { border-color: var(--text-muted); color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Feature tag matrix */
.tag-matrix { display: flex; flex-wrap: wrap; gap: 4px; }
.ftag {
  padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
  font-size: 11px; cursor: pointer; transition: var(--transition);
  color: var(--text-sec); background: transparent; display: flex;
  align-items: center; gap: 3px; user-select: none; font-family: var(--font);
}
.ftag:hover { border-color: var(--sage); color: var(--sage); }
.ftag.active { background: rgba(139,168,136,0.15); border-color: var(--sage); color: var(--sage); }
.ftag .ftag-icon { font-size: 12px; }

.stats-box {
  background: var(--bg-cream); border-radius: var(--radius-sm); padding: 10px;
  border: 1px solid var(--border-light);
}
.stats-box .stat-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.stats-box .stat-row .label { color: var(--text-muted); }
.stats-box .stat-row .value { font-weight: 600; color: var(--accent); }

/* ===== MAIN CONTENT ===== */
.main {
  padding: 16px; overflow-y: auto;
}

.result-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.result-header .result-title {
  font-size: 14px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 6px;
}
.result-header .result-count { font-size: 12px; color: var(--text-muted); font-weight: 400; }
.sort-btn {
  background: var(--bg-cream); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 10px; font-size: 12px; color: var(--text-sec); cursor: pointer;
  font-family: var(--font); transition: var(--transition);
}
.sort-btn:hover { background: var(--bg-hover); }

/* Masonry layout */
.masonry {
  columns: 2; column-gap: 14px;
}

/* Venue Card */
.venue-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: var(--radius); padding: 14px;
  break-inside: avoid; margin-bottom: 14px;
  transition: var(--transition); cursor: pointer; position: relative;
}
.venue-card:hover {
  border-color: var(--accent); box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.card-add-btn {
  position: absolute; top: 10px; right: 10px;
  background: var(--accent-light); border: 1px solid var(--accent);
  border-radius: 50%; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; color: var(--accent);
  transition: var(--transition); z-index: 2;
}
.card-add-btn:hover { background: var(--accent); color: #fff; }
.card-add-btn.in-itinerary { background: var(--green); border-color: var(--green); color: #fff; }
.card-add-btn.in-itinerary:hover { background: var(--red); border-color: var(--red); }

.card-title {
  font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4;
  margin-bottom: 6px; padding-right: 30px;
}

.card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
.tag {
  font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500;
}
.tag-cat { background: rgba(196,122,90,0.12); color: #A06040; }
.tag-district { background: rgba(155,122,216,0.12); color: #7B5AD0; }
.tag-age { background: rgba(109,184,143,0.12); color: #4DA868; }
.tag-free { background: rgba(212,160,74,0.12); color: #C08830; }
.tag-paid { background: rgba(216,112,152,0.12); color: #C06080; }
.tag-indoor { background: rgba(91,173,196,0.12); color: #3A98B8; }
.tag-outdoor { background: rgba(139,168,136,0.12); color: #6A9060; }
.tag-event { background: rgba(212,96,106,0.12); color: #C04050; font-weight: 600; }
.tag-review-good { background: rgba(109,184,143,0.15); color: #3DA068; }
.tag-review-bad { background: rgba(212,96,106,0.15); color: #C04050; }
.tag-feature { background: rgba(139,168,136,0.10); color: #6A9060; font-size: 10px; }

.card-desc {
  font-size: 12px; color: var(--text-sec); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

.card-events { margin-top: 8px; }
.card-event-row {
  display: flex; gap: 6px; padding: 6px 8px;
  background: var(--bg-cream); border-radius: 6px;
  margin-bottom: 4px; font-size: 11px;
}
.card-event-row .ev-date { color: var(--accent); font-weight: 600; min-width: 48px; }
.card-event-row .ev-title { font-weight: 500; }

.card-review-badge {
  display: flex; align-items: center; gap: 4px; margin-top: 6px;
  font-size: 11px; padding: 4px 8px; border-radius: 6px;
}
.card-review-badge.good { background: rgba(109,184,143,0.10); color: var(--green); }
.card-review-badge.mixed { background: rgba(212,160,74,0.10); color: var(--orange); }
.card-review-badge.bad { background: rgba(212,96,106,0.10); color: var(--red); }

/* ===== HOVER PREVIEW ===== */
.hover-preview {
  position: fixed; z-index: 40; width: 280px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  box-shadow: var(--shadow-md); pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
  font-size: 12px;
}
.hover-preview.show { opacity: 1; }
.hover-preview .hp-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.hover-preview .hp-row { display: flex; gap: 6px; margin-bottom: 4px; color: var(--text-sec); }
.hover-preview .hp-row .hp-label { color: var(--text-muted); min-width: 50px; }
.hover-preview .hp-feature { font-size: 11px; color: var(--accent); font-weight: 500; }

/* ===== ITINERARY PANEL ===== */
.itinerary-panel {
  position: fixed; bottom: 20px; right: 20px; z-index: 60;
  width: 360px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-md); transition: var(--transition);
  display: none;
}
.itinerary-panel.open { display: block; }
.itinerary-panel .itin-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg-cream); border-radius: var(--radius) var(--radius) 0 0;
}
.itinerary-panel .itin-header h3 { font-size: 14px; font-weight: 600; }
.itinerary-panel .itin-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer;
}
.itinerary-panel .itin-body { padding: 14px; max-height: 360px; overflow-y: auto; }
.itinerary-panel .itin-empty {
  text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;
}
.itinerary-panel .itin-item {
  display: flex; align-items: center; gap: 10px; padding: 8px;
  border-radius: var(--radius-sm); background: var(--bg-cream);
  margin-bottom: 6px; position: relative;
}
.itinerary-panel .itin-item .itin-order {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent); color: #fff; text-align: center;
  font-size: 12px; font-weight: 700; line-height: 24px;
}
.itinerary-panel .itin-item .itin-venue-info { flex: 1; font-size: 12px; }
.itinerary-panel .itin-item .itin-venue-name { font-weight: 600; color: var(--text); }
.itinerary-panel .itin-item .itin-venue-meta { color: var(--text-muted); font-size: 10px; }
.itinerary-panel .itin-item .itin-remove {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 14px; transition: var(--transition);
}
.itinerary-panel .itin-item .itin-remove:hover { color: var(--red); }

.itinerary-panel .itin-route {
  margin-top: 10px; padding: 10px; background: var(--accent-light);
  border-radius: var(--radius-sm); font-size: 12px;
}
.itinerary-panel .itin-route .itin-route-label {
  font-weight: 600; color: var(--accent); margin-bottom: 4px;
}
.itinerary-panel .itin-route .itin-timeline {
  display: flex; flex-direction: column; gap: 4px;
}
.itinerary-panel .itin-route .itin-timeline-row {
  display: flex; gap: 8px; align-items: center;
}
.itinerary-panel .itin-route .itin-time-slot {
  font-weight: 500; color: var(--accent); min-width: 60px;
}
.itinerary-panel .itin-route .itin-time-venue { color: var(--text); }

.itinerary-panel .itin-footer {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.itinerary-panel .itin-copy-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 6px 14px;
  font-size: 12px; cursor: pointer; font-weight: 500;
  font-family: var(--font); transition: var(--transition);
}
.itinerary-panel .itin-copy-btn:hover { background: #B06848; }
.itinerary-panel .itin-clear-btn {
  background: none; border: 1px solid var(--border); color: var(--text-sec);
  border-radius: var(--radius-sm); padding: 6px 10px;
  font-size: 12px; cursor: pointer; font-family: var(--font);
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(61,48,36,0.30); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);
  max-width: 640px; width: 92%; max-height: 85vh; overflow-y: auto; padding: 24px;
  box-shadow: var(--shadow-md); position: relative;
}
.modal .close-btn {
  position: absolute; top: 14px; right: 14px; background: none; border: none;
  color: var(--text-muted); font-size: 20px; cursor: pointer; transition: var(--transition);
}
.modal .close-btn:hover { color: var(--text); }
.modal h2 { font-size: 18px; margin-bottom: 10px; padding-right: 30px; }
.modal .detail-section { margin-bottom: 14px; }
.modal .detail-label {
  font-size: 11px; color: var(--text-muted); margin-bottom: 3px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.modal .detail-value { font-size: 13px; color: var(--text); }

.modal .copy-btn-row { display: flex; gap: 8px; margin-top: 10px; }
.copy-btn {
  display: flex; align-items: center; gap: 4px;
  background: var(--bg-cream); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 6px 10px; font-size: 12px; color: var(--text-sec); cursor: pointer;
  transition: var(--transition); font-family: var(--font);
}
.copy-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { background: rgba(109,184,143,0.15); border-color: var(--green); color: var(--green); }

.event-row {
  display: flex; gap: 8px; padding: 8px 10px;
  background: var(--bg-cream); border-radius: var(--radius-sm); margin-bottom: 6px;
}
.event-row .event-date { font-size: 12px; color: var(--accent); font-weight: 600; min-width: 48px; }
.event-row .event-info { font-size: 12px; }
.event-row .event-info strong { display: block; margin-bottom: 2px; }

/* Honest Reviews */
.review-section { margin-top: 14px; }
.review-section .review-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 8px; display: flex; align-items: center; gap: 4px;
}
.review-card {
  background: var(--bg-cream); border-radius: var(--radius-sm);
  padding: 10px 12px; margin-bottom: 6px; border: 1px solid var(--border-light);
}
.review-card .review-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.review-card .review-rating {
  display: flex; gap: 2px; font-size: 12px;
}
.review-card .review-author { font-size: 11px; color: var(--text-muted); }
.review-card .review-text { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
.review-card .review-pro { color: var(--green); font-weight: 500; }
.review-card .review-con { color: var(--red); font-weight: 500; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: 40px 16px; color: var(--text-muted); grid-column: 1 / -1;
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 13px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .search-wrap input { width: 160px; }
  .masonry { columns: 1; }
  .itinerary-panel { width: 300px; right: 10px; bottom: 10px; }
}
@media (min-width: 1200px) {
  .masonry { columns: 3; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo"><span class="logo-icon">👣</span>遛娃<span class="logo-text">小脚印 · 上海</span></div>
      <div class="date-badge" id="dateBadge"></div>
    </div>
    <div class="header-right">
      <div class="header-weather" id="headerWeather" title="上海实时天气">
        <span class="hw-icon">🌤️</span><span class="hw-temp">--°</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索场馆、活动、区域..." oninput="applyFilters()">
      </div>
      <button class="itinerary-toggle-btn" onclick="toggleItinerary()" id="itineraryToggle">
        🗺️ 路线<span class="itin-count" id="itinCountBadge">0</span>
      </button>

// ==================== WEATHER ====================
async function fetchWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=31.2304&longitude=121.4737&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=relative_humidity_2m&timezone=Asia/Shanghai&forecast_days=1';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Weather API error');
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const humidity = data.hourly.relative_humidity_2m[new Date().getHours()] || data.current.relative_humidity_2m;
    const wind = Math.round(data.current.wind_speed_10m);
    const feels = Math.round(data.current.apparent_temperature);
    const code = data.current.weather_code;
    let icon = 'cloud', cond = '多云';
    if (code <= 3) { icon = 'sun'; cond = code === 0 ? '晴' : '多云'; }
    else if (code <= 48) { icon = 'fog'; cond = '雾'; }
    else if (code <= 67) { icon = 'rain'; cond = '雨'; }
    else if (code <= 77) { icon = 'snow'; cond = '雪'; }
    else { icon = 'storm'; cond = '雷阵雨'; }
    const iconMap = { sun: '☀️', cloud: '⛅', fog: '🌫️', rain: '🌧️', snow: '🌨️', storm: '⛈️' };

    // Update sidebar weather
    const wm = $('weatherMini');
    wm.querySelector('.wm-temp').textContent = temp + '°';
    wm.querySelector('.wm-cond').innerHTML = '<span>' + iconMap[icon] + '</span> ' + cond + ' 体感' + feels + '°';
    wm.querySelector('.wm-detail').textContent = '湿度 ' + humidity + '% 风速 ' + wind + 'km/h';

    // Update header weather
    const hw = $('headerWeather');
    hw.innerHTML = '<span class="hw-icon">' + iconMap[icon] + '</span><span class="hw-temp">' + temp + '°</span>';

    // Weather tip
    const tip = $('wmTip');
    if (temp >= 33) {
      tip.textContent = '高温预警！注意防暑，推荐室内场馆';
      tip.style.display = 'block';
    } else if (icon === 'rain' || icon === 'storm') {
      tip.textContent = '雨天推荐室内场馆和雨天避难标签';
      tip.style.display = 'block';
    } else if (temp <= 5) {
      tip.textContent = '天冷注意保暖，多穿件衣服';
      tip.style.display = 'block';
    } else {
      tip.style.display = 'none';
    }

    // Auto-select weather mode
    if (icon === 'rain' || icon === 'storm' || icon === 'snow') {
      setWeatherMode('rainy', false);
    } else {
      setWeatherMode('sunny', false);
    }
  } catch (e) {
    console.log('Weather fetch failed:', e);
  }
}

// ==================== AGE SLIDER ====================
function initAgeSlider() {
  const track = $('ageSliderTrack');
  const thumbMin = $('ageSliderThumbMin');
  const thumbMax = $('ageSliderThumbMax');
  const fill = $('ageSliderFill');
  const valuesLabel = $('ageSliderValues');
  const MIN_VAL = 0, MAX_VAL = 18;

  function updateSlider() {
    const minPct = (state.ageMin / MAX_VAL) * 100;
    const maxPct = (state.ageMax / MAX_VAL) * 100;
    thumbMin.style.left = 'calc(' + minPct + '% - 8px)';
    thumbMax.style.left = 'calc(' + maxPct + '% - 8px)';
    fill.style.left = minPct + '%';
    fill.style.width = (maxPct - minPct) + '%';
    const minLabel = state.ageMin === 0 ? '0' : (state.ageMin < 1 ? state.ageMin : state.ageMin);
    const maxLabel = state.ageMax >= MAX_VAL ? '18+' : state.ageMax;
    valuesLabel.textContent = (Number.isInteger(state.ageMin) ? state.ageMin : state.ageMin.toFixed(1)) + '岁 ~ ' + (Number.isInteger(state.ageMax) ? state.ageMax : state.ageMax.toFixed(1)) + '岁';
  }

  function startDrag(thumb, isMin) {
    thumb.classList.add('dragging');
    const trackRect = track.getBoundingClientRect();

    function onMove(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      let pct = (clientX - trackRect.left) / trackRect.width;
      pct = Math.max(0, Math.min(1, pct));
      let val = Math.round(pct * MAX_VAL * 2) / 2; // 0.5 step
      if (isMin) {
        val = Math.min(val, state.ageMax - 0.5);
        state.ageMin = val;
      } else {
        val = Math.max(val, state.ageMin + 0.5);
        state.ageMax = val;
      }
      updateSlider();
      applyFilters();
    }

    function onEnd() {
      thumb.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  }

  thumbMin.addEventListener('mousedown', (e) => { e.preventDefault(); startDrag(thumbMin, true); });
  thumbMax.addEventListener('mousedown', (e) => { e.preventDefault(); startDrag(thumbMax, false); });
  thumbMin.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(thumbMin, true); }, { passive: false });
  thumbMax.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(thumbMax, false); }, { passive: false });

  updateSlider();
}

// ==================== VENUE TAGS ====================
function getVenueTags(venue) {
  const tags = new Set();
  const extra = VENUE_EXTRA_TAGS[venue.id] || [];
  extra.forEach(t => tags.add(t));

  // Auto-derived tags
  if (venue.indoor) tags.add('rain_ok');
  if (venue.free) tags.add('low_cost');
  if (venue.transport && venue.transport.includes('地铁')) tags.add('tram_direct');

  return tags;
}

// ==================== AGE RANGE MATCHING ====================
function parseMinAge(rangeId) {
  if (rangeId === 'all') return 0;
  if (rangeId === '12+') return 12;
  return parseInt(rangeId.split('-')[0]) || 0;
}

function parseMaxAge(rangeId) {
  if (rangeId === 'all') return 18;
  if (rangeId === '12+') return 18;
  return parseInt(rangeId.split('-')[1]) || 18;
}

function venueMatchesAge(venue) {
  if (!venue.ageRange || venue.ageRange.length === 0) return true;
  for (const range of venue.ageRange) {
    const vMin = parseMinAge(range);
    const vMax = parseMaxAge(range);
    // Check overlap between [vMin, vMax] and [state.ageMin, state.ageMax]
    if (vMin <= state.ageMax && vMax >= state.ageMin) return true;
  }
  return false;
}

function selectDistrict(dist) {

  document.querySelectorAll('[data-dist-region]').forEach(el => el.classList.remove('active'));

function selectDistrictRegion(regionId) {
  const region = DISTRICT_REGIONS.find(r => r.id === regionId);
  if (!region) return;
  state.district = 'region:' + regionId;
  document.querySelectorAll('[data-dist]').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('[data-dist-region]').forEach(el => el.classList.remove('active'));
  const el = document.querySelector('[data-dist-region="' + regionId + '"]');
  if (el) el.classList.add('active');
  applyFilters();
}

function toggleFeatureTag(tagId) {
  if (state.featureTags.has(tagId)) {
    state.featureTags.delete(tagId);
  } else {
    state.featureTags.add(tagId);
  }
  const el = document.querySelector('[data-ftag="' + tagId + '"]');
  if (el) el.classList.toggle('active');
  applyFilters();
}

// ==================== FILTERING ====================
function getFilteredVenues() {
  let results = VENUES.filter(v => {
    // Search
    if (state.search) {
      const q = state.search.toLowerCase();
      const haystack = (v.name + v.desc + v.district + v.address + (v.ticket || '') + (v.events ? v.events.map(e => e.title).join(' ') : '')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // Category
    if (state.category !== 'all' && v.category !== state.category) return false;
    // District
    if (state.district !== 'all') {
      if (state.district.startsWith('region:')) {
        const regionId = state.district.split(':')[1];
        const region = DISTRICT_REGIONS.find(r => r.id === regionId);
        if (region && !region.districts.includes(v.district)) return false;
      } else if (v.district !== state.district) return false;
    }
    // Venue type
    if (state.venueType === 'indoor' && !v.indoor) return false;
    if (state.venueType === 'outdoor' && v.indoor) return false;
    // Weather
    if (state.weather === 'rainy') {
      if (!v.indoor) return false;
    }
    // Age
    if (!venueMatchesAge(v)) return false;
    // Feature tags
    if (state.featureTags.size > 0) {
      const vTags = getVenueTags(v);
      for (const t of state.featureTags) {
        if (!vTags.has(t)) return false;
      }
    }
    return true;
  });

  // Sorting
  if (state.sortBy === 'event') {
    results.sort((a, b) => {
      const aHas = a.events && a.events.length > 0 ? 1 : 0;
      const bHas = b.events && b.events.length > 0 ? 1 : 0;
      return bHas - aHas;
    });
  } else if (state.sortBy === 'free') {
    results.sort((a, b) => {
      if (a.free && !b.free) return -1;
      if (!a.free && b.free) return 1;
      return 0;
    });
  } else if (state.sortBy === 'near') {
    results.sort((a, b) => {
      const aRegion = DISTRICT_REGIONS.findIndex(r => r.districts.includes(a.district));
      const bRegion = DISTRICT_REGIONS.findIndex(r => r.districts.includes(b.district));
      return aRegion - bRegion;
    });
  }

  return results;
}

function applyFilters() {
  state.search = $('searchInput').value.trim();
  const filtered = getFilteredVenues();
  renderMasonry(filtered);
  updateStats();
}

function sortVenues(sortBy) {
  if (state.sortBy === sortBy) {
    state.sortBy = null;
  } else {
    state.sortBy = sortBy;
  }
  // Update button styles
  ['sortEvent','sortFree','sortNear'].forEach(id => {
    $(id).style.background = '';
    $(id).style.color = '';
  });
  if (state.sortBy) {
    const btnId = sortBy === 'event' ? 'sortEvent' : sortBy === 'free' ? 'sortFree' : 'sortNear';
    $(btnId).style.background = 'var(--accent-light)';
    $(btnId).style.color = 'var(--accent)';
  }
  applyFilters();
}

// ==================== STATS ====================
function updateStats() {
  $('statVenues').textContent = VENUES.length;
  let eventCount = 0, freeCount = 0;
  for (const v of VENUES) {
    if (v.events && v.events.length > 0) eventCount += v.events.length;
    if (v.free) freeCount++;
  }
  $('statEvents').textContent = eventCount;
  $('statFree').textContent = freeCount;
}

// ==================== MASONRY RENDERING ====================
function renderMasonry(venues) {
  resultCount.textContent = ' · ' + venues.length + ' 个场馆';
  if (venues.length === 0) {
    masonryGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>没有找到符合条件的场馆，试试调整筛选条件</p></div>';
    return;
  }
  let html = '';
  for (const v of venues) {
    html += renderVenueCard(v);
  }
  masonryGrid.innerHTML = html;
  // Attach hover events
  masonryGrid.querySelectorAll('.venue-card').forEach(card => {
    const vid = parseInt(card.dataset.vid);
    card.addEventListener('mouseenter', (e) => showHoverPreview(vid, e));
    card.addEventListener('mouseleave', () => hideHoverPreview());
    // Add button
    const addBtn = card.querySelector('.card-add-btn');
    if (addBtn) {
      addBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleItineraryAdd(vid);
      });
    }
  });
}

function renderVenueCard(v) {
  const cat = CATEGORIES[v.category] || { name: '其他', color: '#999' };
  const inItin = state.itinerary.includes(v.id);
  let tagsHtml = '';
  tagsHtml += '<span class="tag tag-cat" style="background:' + cat.color + '20;color:' + cat.color + '90">' + cat.name + '</span>';
  tagsHtml += '<span class="tag tag-district">' + v.district + '</span>';
  if (v.free) tagsHtml += '<span class="tag tag-free">免费</span>';
  else if (v.ticket) tagsHtml += '<span class="tag tag-paid">付费</span>';
  tagsHtml += '<span class="tag tag-' + (v.indoor ? 'indoor' : 'outdoor') + '">' + (v.indoor ? '室内' : '户外') + '</span>';

  // Feature tags (show up to 3)
  const vTags = getVenueTags(v);
  const tagNames = [];
  for (const t of vTags) {
    const ft = FEATURE_TAGS.find(f => f.id === t);
    if (ft) tagNames.push(ft);
  }
  const shownTags = tagNames.slice(0, 3);
  for (const ft of shownTags) {
    tagsHtml += '<span class="tag tag-feature">' + ft.icon + ' ' + ft.name + '</span>';
  }

  // Events (show up to 2)
  let eventsHtml = '';
  if (v.events && v.events.length > 0) {
    eventsHtml = '<div class="card-events">';
    const shown = v.events.slice(0, 2);
    for (const ev of shown) {
      eventsHtml += '<div class="card-event-row"><span class="ev-date">' + ev.date.slice(5) + '</span><span class="ev-title">' + ev.title + '</span></div>';
    }
    if (v.events.length > 2) {
      eventsHtml += '<div class="card-event-row" style="justify-content:center;color:var(--text-muted)">+' + (v.events.length - 2) + '场活动</div>';
    }
    eventsHtml += '</div>';
  }

  // Review badge
  let reviewBadge = '';
  const reviews = VENUE_HONEST_REVIEWS[v.id];
  if (reviews) {
    const goodCount = reviews.filter(r => r.rating === 'good').length;
    const badCount = reviews.filter(r => r.rating === 'bad').length;
    if (goodCount > badCount) {
      reviewBadge = '<div class="card-review-badge good">👍 老母亲推荐</div>';
    } else if (badCount > 0 && badCount >= goodCount) {
      reviewBadge = '<div class="card-review-badge bad">⚠️ 有避坑提醒</div>';
    } else {
      reviewBadge = '<div class="card-review-badge mixed">🤔 褒贬不一</div>';
    }
  }

  return '<div class="venue-card" data-vid="' + v.id + '" onclick="openModal(' + v.id + ')">' +
    '<div class="card-add-btn ' + (inItin ? 'in-itinerary' : '') + '" title="' + (inItin ? '从路线移除' : '加入路线') + '">' + (inItin ? '✓' : '+') + '</div>' +
    '<div class="card-title">' + v.name + '</div>' +
    '<div class="card-tags">' + tagsHtml + '</div>' +
    '<div class="card-desc">' + (v.desc || '') + '</div>' +
    eventsHtml +
    reviewBadge +
    '</div>';
}

// ==================== HOVER PREVIEW ====================
let hoverTimer = null;
function showHoverPreview(vid, e) {
  clearTimeout(hoverTimer);
  hoverTimer = setTimeout(() => {
    const v = VENUES.find(x => x.id === vid);
    if (!v) return;
    const cat = CATEGORIES[v.category] || { name: '其他' };
    const ages = (v.ageRange || []).map(ar => {
      const a = AGE_RANGES.find(r => r.id === ar);
      return a ? a.name : ar;
    }).join(', ');

    // Feature highlights
    const vTags = getVenueTags(v);
    let features = [];
    for (const t of vTags) {
      const ft = FEATURE_TAGS.find(f => f.id === t);
      if (ft) features.push(ft.icon + ' ' + ft.name);
    }

    // Review summary
    let reviewText = '';
    const reviews = VENUE_HONEST_REVIEWS[v.id];
    if (reviews && reviews.length > 0) {
      reviewText = reviews[0].text.substring(0, 80);
      if (reviews[0].text.length > 80) reviewText += '...';
    }

    hoverPreview.innerHTML =
      '<div class="hp-name">' + v.name + '</div>' +
      '<div class="hp-row"><span class="hp-label">适龄段</span>' + (ages || '全年龄') + '</div>' +
      '<div class="hp-row"><span class="hp-label">门票</span>' + (v.free ? '免费' : (v.ticket || '未知')) + '</div>' +
      '<div class="hp-row"><span class="hp-label">交通</span>' + (v.transport || '未知') + '</div>' +
      (features.length > 0 ? '<div class="hp-feature" style="margin-top:6px">' + features.slice(0, 4).join('  ') + '</div>' : '') +
      (reviewText ? '<div style="margin-top:6px;font-size:11px;color:var(--text-muted);font-style:italic;line-height:1.4">"' + reviewText + '"</div>' : '');

    // Position
    const rect = e.currentTarget.getBoundingClientRect();
    const px = rect.right + 10;
    const py = rect.top;
    const pw = 280;
    const ph = hoverPreview.offsetHeight || 200;
    let left = px;
    let top = py;
    if (left + pw > window.innerWidth - 10) left = rect.left - pw - 10;
    if (top + ph > window.innerHeight - 10) top = window.innerHeight - ph - 10;
    if (top < 10) top = 10;
    hoverPreview.style.left = left + 'px';
    hoverPreview.style.top = top + 'px';
    hoverPreview.classList.add('show');
  }, 200);
}

function hideHoverPreview() {
  clearTimeout(hoverTimer);
  hoverPreview.classList.remove('show');
}

// ==================== ITINERARY ====================
function toggleItineraryAdd(vid) {
  const idx = state.itinerary.indexOf(vid);
  if (idx >= 0) {
    state.itinerary.splice(idx, 1);
  } else {
    state.itinerary.push(vid);
  }
  updateItineraryUI();
  applyFilters(); // re-render to update button states
}

function removeFromItinerary(vid) {
  const idx = state.itinerary.indexOf(vid);
  if (idx >= 0) state.itinerary.splice(idx, 1);
  updateItineraryUI();
  applyFilters();
}

function clearItinerary() {
  state.itinerary = [];
  updateItineraryUI();
  applyFilters();
}

function toggleItinerary() {
  $('itineraryPanel').classList.toggle('open');
}

function updateItineraryUI() {
  const count = state.itinerary.length;
  $('itinCountBadge').textContent = count;

  const body = $('itinBody');
  const route = $('itinRoute');

  if (count === 0) {
    body.innerHTML = '<div class="itin-empty">点击场馆卡片上的 + 号添加到路线</div>';
    route.style.display = 'none';
    return;
  }

  // Auto-sort: downtown first, then near, then far
  const sorted = [...state.itinerary].sort((a, b) => {
    const va = VENUES.find(v => v.id === a);
    const vb = VENUES.find(v => v.id === b);
    if (!va || !vb) return 0;
    const ra = DISTRICT_REGIONS.findIndex(r => r.districts.includes(va.district));
    const rb = DISTRICT_REGIONS.findIndex(r => r.districts.includes(vb.district));
    return ra - rb;
  });

  let html = '';
  sorted.forEach((vid, i) => {
    const v = VENUES.find(x => x.id === vid);
    if (!v) return;
    html += '<div class="itin-item">' +
      '<div class="itin-order">' + (i + 1) + '</div>' +
      '<div class="itin-venue-info">' +
        '<div class="itin-venue-name">' + v.name + '</div>' +
        '<div class="itin-venue-meta">' + v.district + ' · ' + (v.free ? '免费' : (v.ticket || '')) + '</div>' +
      '</div>' +
      '<button class="itin-remove" onclick="removeFromItinerary(' + vid + ')">✕</button>' +
    '</div>';
  });
  body.innerHTML = html;

  // Generate route timeline
  if (count >= 2) {
    const timeSlots = ['上午 9:00', '中午 12:00', '下午 14:00', '下午 16:00', '傍晚 18:00'];
    let routeHtml = '<div class="itin-route-label">🗺️ 推荐动线</div><div class="itin-timeline">';
    sorted.forEach((vid, i) => {
      const v = VENUES.find(x => x.id === vid);
      if (!v) return;
      const slot = timeSlots[i] || ('第' + (i+1) + '站');
      routeHtml += '<div class="itin-timeline-row"><span class="itin-time-slot">' + slot + '</span><span class="itin-time-venue">' + v.name + '</span></div>';
      if (i < sorted.length - 1) {
        const next = VENUES.find(x => x.id === sorted[i+1]);
        if (next) {
          const sameDist = v.district === next.district;
          routeHtml += '<div class="itin-timeline-row" style="padding-left:68px;color:var(--text-muted);font-size:10px">↓ ' + (sameDist ? '同区域，约15分钟' : '跨区，约30-45分钟') + '</div>';
        }
      }
    });
    routeHtml += '</div>';

    // Total travel time estimate
    let crossCount = 0;
    for (let i = 0; i < sorted.length - 1; i++) {
      const va = VENUES.find(v => v.id === sorted[i]);
      const vb = VENUES.find(v => v.id === sorted[i+1]);
      if (va && vb && va.district !== vb.district) crossCount++;
    }
    const totalTime = crossCount * 35 + (sorted.length - 1 - crossCount) * 15;
    routeHtml += '<div style="margin-top:6px;font-size:11px;color:var(--accent)">🚗 预计总车程约 ' + totalTime + ' 分钟</div>';

    route.innerHTML = routeHtml;
    route.style.display = 'block';
  } else {
    route.style.display = 'none';
  }
}

function copyItinerary() {
  if (state.itinerary.length === 0) return;
  const sorted = [...state.itinerary].sort((a, b) => {
    const va = VENUES.find(v => v.id === a);
    const vb = VENUES.find(v => v.id === b);
    if (!va || !vb) return 0;
    const ra = DISTRICT_REGIONS.findIndex(r => r.districts.includes(va.district));
    const rb = DISTRICT_REGIONS.findIndex(r => r.districts.includes(vb.district));
    return ra - rb;
  });

  const timeSlots = ['上午', '中午', '下午', '傍晚', '晚上'];
  let text = '🗺️ 今日遛娃路线\n\n';
  sorted.forEach((vid, i) => {
    const v = VENUES.find(x => x.id === vid);
    if (!v) return;
    const slot = timeSlots[i] || ('第' + (i+1) + '站');
    text += slot + ': ' + v.name + '\n';
    text += '  📍 ' + v.address + '\n';
    text += '  🎫 ' + (v.free ? '免费' : v.ticket) + '\n';
    text += '  🚇 ' + v.transport + '\n';
    if (i < sorted.length - 1) text += '\n';
  });
  text += '\n—— 由遛娃小脚印生成';

  copyText(text, $('itineraryPanel').querySelector('.itin-copy-btn'));
}

// ==================== COPY UTILITY ====================
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    if (btn) {
      const originalText = btn.innerHTML;
      btn.innerHTML = '✅ 已复制';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.classList.remove('copied');
      }, 2000);
    }
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) {
      const originalText = btn.innerHTML;
      btn.innerHTML = '✅ 已复制';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.classList.remove('copied');
      }, 2000);
    }
  });
}

// ==================== MODAL ====================
function openModal(vid) {
  const v = VENUES.find(x => x.id === vid);
  if (!v) return;
  const cat = CATEGORIES[v.category] || { name: '其他', color: '#999' };
  const ages = (v.ageRange || []).map(ar => {
    const a = AGE_RANGES.find(r => r.id === ar);
    return a ? a.name : ar;
  }).join(', ');

  // Feature tags
  const vTags = getVenueTags(v);
  let featuresHtml = '';
  for (const t of vTags) {
    const ft = FEATURE_TAGS.find(f => f.id === t);
    if (ft) featuresHtml += '<span class="tag tag-feature">' + ft.icon + ' ' + ft.name + '</span>';
  }

  // Events
  let eventsHtml = '';
  if (v.events && v.events.length > 0) {
    eventsHtml = '<div class="detail-section"><div class="detail-label">📅 近期活动</div>';
    for (const ev of v.events) {
      eventsHtml += '<div class="event-row"><span class="event-date">' + ev.date + '</span><div class="event-info"><strong>' + ev.title + '</strong>' + (ev.desc || '') + '</div></div>';
    }
    eventsHtml += '</div>';
  }

  // Honest reviews
  let reviewsHtml = '';
  const reviews = VENUE_HONEST_REVIEWS[v.id];
  if (reviews && reviews.length > 0) {
    reviewsHtml = '<div class="review-section"><div class="review-title">💬 老母亲真实点评</div>';
    for (const r of reviews) {
      const stars = r.rating === 'good' ? '👍' : r.rating === 'bad' ? '👎' : '🤔';
      const ratingClass = r.rating === 'good' ? 'review-pro' : r.rating === 'bad' ? 'review-con' : '';
      reviewsHtml += '<div class="review-card">' +
        '<div class="review-header"><span class="review-rating">' + stars + '</span><span class="review-author">@' + r.author + '</span></div>' +
        '<div class="review-text ' + ratingClass + '">' + r.text + '</div>' +
      '</div>';
    }
    reviewsHtml += '</div>';
  }

  const inItin = state.itinerary.includes(v.id);

  const html =
    '<div class="modal-overlay" onclick="closeModal(event)">' +
      '<div class="modal" onclick="event.stopPropagation()">' +
        '<button class="close-btn" onclick="closeModal()">✕</button>' +
        '<h2>' + v.name + '</h2>' +
        '<div class="card-tags" style="margin-bottom:10px">' +
          '<span class="tag tag-cat" style="background:' + cat.color + '20;color:' + cat.color + '90">' + cat.name + '</span>' +
          '<span class="tag tag-district">' + v.district + '</span>' +
          (v.free ? '<span class="tag tag-free">免费</span>' : '<span class="tag tag-paid">付费</span>') +
          '<span class="tag tag-' + (v.indoor ? 'indoor' : 'outdoor') + '">' + (v.indoor ? '室内' : '户外') + '</span>' +
          (featuresHtml ? featuresHtml : '') +
        '</div>' +
        '<div class="detail-section"><div class="detail-label">📝 简介</div><div class="detail-value">' + (v.desc || '') + '</div></div>' +
        '<div class="detail-section"><div class="detail-label">👶 适龄</div><div class="detail-value">' + (ages || '全年龄') + '</div></div>' +
        '<div class="detail-section"><div class="detail-label">🎫 门票</div><div class="detail-value">' + (v.free ? '免费' : (v.ticket || '未知')) + '</div></div>' +
        '<div class="detail-section"><div class="detail-label">📍 地址</div><div class="detail-value">' + (v.address || '') + '</div></div>' +
        '<div class="detail-section"><div class="detail-label">🚇 交通</div><div class="detail-value">' + (v.transport || '') + '</div></div>' +
        eventsHtml +
        reviewsHtml +
        '<div class="copy-btn-row">' +
          '<button class="copy-btn" onclick="copyVenueInfo(' + v.id + ', \'address\', this)">📋 复制地址</button>' +
          '<button class="copy-btn" onclick="copyVenueInfo(' + v.id + ', \'ticket\', this)">🎫 复制票价</button>' +
          '<button class="copy-btn" onclick="copyVenueInfo(' + v.id + ', \'transport\', this)">🚇 复制交通</button>' +
          '<button class="copy-btn" onclick="copyVenueInfo(' + v.id + ', \'all\', this)">📋 复制全部</button>' +
        '</div>' +
        '<div style="margin-top:14px;display:flex;gap:8px">' +
          '<button class="itinerary-copy-btn" style="flex:1" onclick="toggleItineraryAdd(' + v.id + ');closeModal()">' + (inItin ? '✓ 已在路线中' : '+ 加入路线') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  $('modalContainer').innerHTML = html;
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  $('modalContainer').innerHTML = '';
}

function copyVenueInfo(vid, type, btn) {
  const v = VENUES.find(x => x.id === vid);
  if (!v) return;
  let text = '';
  if (type === 'address') {
    text = v.name + '\n地址: ' + v.address;
  } else if (type === 'ticket') {
    text = v.name + '\n门票: ' + (v.free ? '免费' : v.ticket);
  } else if (type === 'transport') {
    text = v.name + '\n交通: ' + v.transport;
  } else {
    text = v.name + '\n地址: ' + v.address + '\n门票: ' + (v.free ? '免费' : v.ticket) + '\n交通: ' + v.transport;
    if (v.events && v.events.length > 0) {
      text += '\n\n近期活动:';
      for (const ev of v.events) {
        text += '\n' + ev.date + ' ' + ev.title;
      }
    }
  }
  copyText(text, btn);
}

// ==================== INIT ====================
function init() {
  initDate();
  renderSidebar();
  initAgeSlider();
  fetchWeather();
  applyFilters();
  updateStats();
}

init();
</script>
